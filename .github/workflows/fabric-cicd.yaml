# https://www.kevinrchant.com/2025/07/10/operationalize-fabric-workspaces-using-fabric-cli-and-fabric-cicd-with-github-actions/

name: fabric-cicd example

#Run the workflow manually
on: workflow_dispatch

jobs:
  Deploy_To_Test:
    name: Deploy to Test
    runs-on: ubuntu-latest

    steps:
      - name: Setup Phyton
        uses: actions/setup-python@v6.2.0
        with:
          python-version: 3.11
        
      - name: Install Libraries
        run: |
          python -m pip install --upgrade pip
          pip install ms-fabric-cli
          pip install fabric-cicd
      - name: Authenticate as Service Principal
        run: fab auth login --username ${{secrets.AZURE_CLIENT_ID}} --password ${{secrets.AZURE_CLIENT_SECRET}} --tenant ${{secrets.AZURE_TENANT_ID}}
        
